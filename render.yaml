services:
  - type: web
    name: nyaayamitra-launchpad
    runtime: node
    plan: free
    region: singapore
    buildCommand: node tests/run-tests.js
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
